<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme Earrape Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); }
        .neon-border { box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.5s infinite; }
    </style>
</head>
<body class="gradient-bg min-h-screen text-gray-100 flex flex-col items-center p-4">

    <header class="w-full max-w-4xl text-center my-8">
        <h1 id="title-text" class="text-5xl md:text-7xl font-black text-red-600 mb-2 italic tracking-tighter">EAR RAPE GEN</h1>
        <p class="text-gray-400 font-bold uppercase tracking-widest">Digital Distortion Engine</p>
    </header>

    <main class="w-full max-w-2xl bg-black/60 backdrop-blur-md rounded-3xl p-6 shadow-2xl border border-white/10">
        
        <!-- Upload -->
        <div id="upload-section" class="flex flex-col items-center justify-center border-2 border-dashed border-gray-500 rounded-2xl p-12 hover:border-red-500 transition-all cursor-pointer bg-white/5" onclick="document.getElementById('video-input').click()">
            <div class="bg-red-600 p-4 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                </svg>
            </div>
            <p class="text-xl font-bold">動画ファイルを選択</p>
            <input type="file" id="video-input" accept="video/*" class="hidden">
        </div>

        <!-- Editor -->
        <div id="editor-section" class="hidden space-y-6">
            <div class="relative rounded-xl overflow-hidden bg-black aspect-video flex items-center justify-center border border-gray-700">
                <video id="preview-video" class="w-full h-full" playsinline crossorigin="anonymous"></video>
                <div id="visualizer-overlay" class="absolute inset-0 pointer-events-none opacity-50 flex items-center justify-center">
                    <!-- Dynamic waves or something could go here -->
                </div>
            </div>

            <div class="space-y-6 bg-white/5 p-6 rounded-2xl">
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-black text-red-500 uppercase">音割れレベル: <span id="gain-display">30</span></label>
                    </div>
                    <input type="range" id="gain-slider" min="1" max="150" value="30" class="w-full h-3 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-red-600">
                </div>

                <button id="process-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl text-xl uppercase tracking-tighter transform active:scale-95 transition-all shadow-lg">
                    動画を書き出す (START RENDER)
                </button>
            </div>
        </div>

        <!-- Processing -->
        <div id="processing-overlay" class="hidden py-10 text-center">
            <div class="mb-6 relative h-4 bg-gray-800 rounded-full overflow-hidden">
                <div id="progress-bar" class="absolute top-0 left-0 h-full bg-red-600 w-0 transition-all duration-300"></div>
            </div>
            <p id="status-text" class="text-2xl font-black text-red-500 animate-pulse">RENDERING LOUDNESS...</p>
        </div>

        <!-- Result -->
        <div id="result-section" class="hidden flex flex-col items-center space-y-6 pt-4">
            <div class="p-4 bg-green-500/20 border border-green-500/50 rounded-xl w-full text-center">
                <p class="text-green-400 font-bold">✓ 鼓膜破壊動画の生成に成功しました</p>
            </div>
            <video id="result-video" class="w-full rounded-xl border border-gray-700 shadow-xl" controls></video>
            <div class="flex flex-col w-full gap-3">
                <a id="download-link" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-center font-black py-4 rounded-xl text-lg uppercase">
                    動画を保存する
                </a>
                <button onclick="location.reload()" class="w-full bg-gray-800 text-gray-400 font-bold py-3 rounded-xl">
                    最初からやり直す
                </button>
            </div>
        </div>
    </main>

    <div id="msg-box" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-white text-black px-8 py-4 rounded-2xl font-bold shadow-2xl hidden z-50 border-4 border-red-600">
        <span id="msg-text"></span>
    </div>

    <script>
        const videoInput = document.getElementById('video-input');
        const previewVideo = document.getElementById('preview-video');
        const gainSlider = document.getElementById('gain-slider');
        const gainDisplay = document.getElementById('gain-display');
        const processBtn = document.getElementById('process-btn');
        const uploadSection = document.getElementById('upload-section');
        const editorSection = document.getElementById('editor-section');
        const processingOverlay = document.getElementById('processing-overlay');
        const progressBar = document.getElementById('progress-bar');
        const resultSection = document.getElementById('result-section');
        const resultVideo = document.getElementById('result-video');
        const downloadLink = document.getElementById('download-link');
        const msgBox = document.getElementById('msg-box');
        const msgText = document.getElementById('msg-text');
        const titleText = document.getElementById('title-text');

        let audioCtx, source, gainNode, streamDestination;
        let isProcessing = false;

        function showMessage(text) {
            msgText.innerText = text;
            msgBox.classList.remove('hidden');
            setTimeout(() => msgBox.classList.add('hidden'), 4000);
        }

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            if (!source) {
                source = audioCtx.createMediaElementSource(previewVideo);
                gainNode = audioCtx.createGain();
                streamDestination = audioCtx.createMediaStreamDestination();

                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                gainNode.connect(streamDestination);
            }
        }

        videoInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                previewVideo.src = url;
                uploadSection.classList.add('hidden');
                editorSection.classList.remove('hidden');
            }
        };

        gainSlider.oninput = () => {
            gainDisplay.innerText = gainSlider.value;
            const val = parseFloat(gainSlider.value);
            if (gainNode) {
                gainNode.gain.setTargetAtTime(Math.pow(val / 10, 2.5), audioCtx.currentTime, 0.01);
            }
            if (val > 100) titleText.classList.add('shaking');
            else titleText.classList.remove('shaking');
        };

        processBtn.onclick = async () => {
            try {
                await initAudio();
                
                isProcessing = true;
                editorSection.classList.add('hidden');
                processingOverlay.classList.remove('hidden');

                const val = parseFloat(gainSlider.value);
                gainNode.gain.setValueAtTime(Math.pow(val / 10, 2.5), audioCtx.currentTime);

                // Check for captureStream support
                if (!previewVideo.captureStream && !previewVideo.mozCaptureStream) {
                    throw new Error("このブラウザは動画のキャプチャをサポートしていません。最新のChromeでお試しください。");
                }

                const stream = previewVideo.captureStream ? previewVideo.captureStream() : previewVideo.mozCaptureStream();
                
                // Audio track from our distorted source
                const distortedAudioTrack = streamDestination.stream.getAudioTracks()[0];
                
                const combinedStream = new MediaStream([
                    ...stream.getVideoTracks(),
                    distortedAudioTrack
                ]);

                const options = { mimeType: 'video/webm;codecs=vp8,opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options.mimeType = 'video/webm';
                }

                const mediaRecorder = new MediaRecorder(combinedStream, options);
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    resultVideo.src = url;
                    downloadLink.href = url;
                    downloadLink.download = `distorted_${Date.now()}.webm`;
                    
                    processingOverlay.classList.add('hidden');
                    resultSection.classList.remove('hidden');
                    isProcessing = false;
                };

                previewVideo.currentTime = 0;
                previewVideo.muted = false;
                previewVideo.volume = 0.05; // 録画中のスピーカー音量は抑える
                
                mediaRecorder.start();

                const checkEnd = () => {
                    if (!isProcessing) return;
                    const progress = (previewVideo.currentTime / previewVideo.duration) * 100;
                    progressBar.style.width = `${progress}%`;
                    
                    if (previewVideo.ended || previewVideo.currentTime >= previewVideo.duration) {
                        mediaRecorder.stop();
                        previewVideo.pause();
                    } else {
                        requestAnimationFrame(checkEnd);
                    }
                };

                previewVideo.play().then(() => {
                    checkEnd();
                }).catch(err => {
                    throw new Error("再生を開始できませんでした。");
                });

            } catch (err) {
                console.error(err);
                showMessage(err.message || "エラーが発生しました。ローカルに保存して実行してください。");
                isProcessing = false;
                processingOverlay.classList.add('hidden');
                editorSection.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
