<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超音割れビデオメーカー</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 600px; width: 100%; background: #2a2a2a; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        video { width: 100%; margin-top: 20px; border-radius: 5px; background: #000; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #ff4757; color: white; font-weight: bold; transition: 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #ff6b81; }
        input[type="range"] { width: 100%; }
        .status { margin-top: 10px; font-size: 0.9em; color: #ffa502; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔊 超音割れメーカー</h1>
    <p>動画を読み込んで、音を破壊します。</p>

    <input type="file" id="upload" accept="video/*">
    
    <div class="controls">
        <label>音割れ強度 (Distortion): <span id="distVal">50</span></label>
        <input type="range" id="distRange" min="1" max="100" value="50">
        
        <label>音量ブースト (Gain): <span id="gainVal">10</span></label>
        <input type="range" id="gainRange" min="1" max="50" value="10">

        <button id="processBtn" disabled>動画を生成・保存する</button>
    </div>

    <div id="status" class="status"></div>
    <video id="preview" controls style="display:none;"></video>
</div>

<script>
    const upload = document.getElementById('upload');
    const processBtn = document.getElementById('processBtn');
    const distRange = document.getElementById('distRange');
    const gainRange = document.getElementById('gainRange');
    const distVal = document.getElementById('distVal');
    const gainVal = document.getElementById('gainVal');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');

    let videoBlobUrl = null;

    distRange.oninput = () => distVal.textContent = distRange.value;
    gainRange.oninput = () => gainVal.textContent = gainRange.value;

    upload.onchange = (e) => {
        if (e.target.files[0]) processBtn.disabled = false;
    };

    async function processVideo() {
        const file = upload.files[0];
        if (!file) return;

        processBtn.disabled = true;
        status.textContent = "処理中... (動画の長さによっては時間がかかります)";

        const videoEl = document.createElement('video');
        videoEl.src = URL.createObjectURL(file);
        videoEl.muted = true;
        await videoEl.play();

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(videoEl);
        
        // --- 音割れエフェクトの構築 ---
        const distNode = audioCtx.createWaveShaper();
        const gainNode = audioCtx.createGain();

        // 歪み曲線の生成
        function makeDistortionCurve(amount) {
            const k = amount;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0 ; i < n_samples; ++i ) {
                const x = i * 2 / n_samples - 1;
                curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        distNode.curve = makeDistortionCurve(distRange.value * 10);
        distNode.oversample = '4x';
        gainNode.gain.value = gainRange.value;

        // 接続
        source.connect(distNode);
        distNode.connect(gainNode);

        // 録画の準備
        const dest = audioCtx.createMediaStreamDestination();
        gainNode.connect(dest);

        const videoStream = videoEl.captureStream();
        const combinedStream = new MediaStream([
            ...videoStream.getVideoTracks(),
            ...dest.stream.getAudioTracks()
        ]);

        const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = () => {
            const resultBlob = new Blob(chunks, { type: 'video/webm' });
            const resultUrl = URL.createObjectURL(resultBlob);
            
            preview.src = resultUrl;
            preview.style.display = "block";
            status.textContent = "完成！ 下の動画を右クリックで保存するか、再生して確認してください。";

            const downloadLink = document.createElement('a');
            downloadLink.href = resultUrl;
            downloadLink.download = "ear_rape_video.webm";
            downloadLink.textContent = "【ここをクリックして保存】";
            downloadLink.style.display = "block";
            downloadLink.style.marginTop = "10px";
            downloadLink.style.color = "#00ff00";
            status.appendChild(downloadLink);
            
            processBtn.disabled = false;
        };

        recorder.start();
        videoEl.onended = () => {
            recorder.stop();
            audioCtx.close();
        };

        // 動画の最後まで再生
        videoEl.currentTime = 0;
        videoEl.play();
    }

    processBtn.onclick = processVideo;
</script>

</body>
</html>
