<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA EAR RAPE MACHINE</title>
    <style>
        body { font-family: 'Arial Black', sans-serif; background: #000; color: #f00; text-align: center; padding: 20px; }
        .main-card { border: 5px solid #f00; background: #111; padding: 20px; max-width: 800px; margin: auto; box-shadow: 0 0 20px #f00; }
        video { width: 100%; border: 2px solid #fff; margin: 15px 0; background: #222; }
        .controls { display: grid; gap: 15px; margin: 20px 0; background: #222; padding: 15px; border-radius: 8px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #f00; }
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { padding: 15px 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; transition: 0.2s; }
        #playBtn { background: #00ff00; color: #000; }
        #recordBtn { background: #ff0000; color: #fff; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .warning { color: yellow; font-size: 0.8rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>⚠️ 音量注意：超音割れ ⚠️</h1>
    <p class="warning">※スピーカーの破損にご注意ください。爆音が出ます。</p>

    <input type="file" id="fileInput" accept="video/*">

    <div class="controls">
        <label>音の歪み (Distortion): <span id="distLabel">100</span></label>
        <input type="range" id="distRange" min="1" max="200" value="100">
        
        <label>爆音ブースト (Gain): <span id="gainLabel">30</span></label>
        <input type="range" id="gainRange" min="1" max="100" value="30">
    </div>

    <div class="btn-group">
        <button id="playBtn">🔊 プレビュー再生</button>
        <button id="recordBtn" disabled>💾 加工して保存用生成</button>
    </div>

    <p id="status"></p>
    <video id="videoPlayer" crossorigin="anonymous"></video>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const video = document.getElementById('videoPlayer');
    const playBtn = document.getElementById('playBtn');
    const recordBtn = document.getElementById('recordBtn');
    const distRange = document.getElementById('distRange');
    const gainRange = document.getElementById('gainRange');
    const status = document.getElementById('status');

    let audioCtx, source, distortion, gainNode, dest;

    // 数値表示の更新
    distRange.oninput = () => document.getElementById('distLabel').innerText = distRange.value;
    gainRange.oninput = () => document.getElementById('gainLabel').innerText = gainRange.value;

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        source = audioCtx.createMediaElementSource(video);
        distortion = audioCtx.createWaveShaper();
        gainNode = audioCtx.createGain();
        dest = audioCtx.createMediaStreamDestination();

        // 激しく歪ませるカーブ作成
        distortion.curve = makeDistortionCurve(distRange.value * 10);
        distortion.oversample = '4x';
        gainNode.gain.value = gainRange.value;

        // プレビュー用にスピーカー(destination)と、録音用に(dest)の両方に繋ぐ
        source.connect(distortion);
        distortion.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.connect(dest);
    }

    function makeDistortionCurve(amount) {
        let n_samples = 44100, curve = new Float32Array(n_samples);
        for (let i = 0 ; i < n_samples; ++i ) {
            let x = i * 2 / n_samples - 1;
            curve[i] = (3 + amount) * x * Math.PI / (Math.PI + amount * Math.abs(x));
        }
        return curve;
    }

    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            recordBtn.disabled = false;
            status.innerText = "動画を読み込みました。";
        }
    };

    // プレビュー再生
    playBtn.onclick = async () => {
        initAudio();
        // スライダーの値を反映
        distortion.curve = makeDistortionCurve(distRange.value * 10);
        gainNode.gain.value = gainRange.value;
        
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        video.play();
        status.innerText = "爆音プレビュー中...";
    };

    // 録画と保存（どのブラウザでもダウンロードを強制する）
    recordBtn.onclick = () => {
        initAudio();
        video.currentTime = 0;
        video.play();
        status.innerText = "録画中... 最後まで再生されるのを待ってください。";

        const stream = video.captureStream();
        const combined = new MediaStream([
            ...stream.getVideoTracks(),
            ...dest.stream.getAudioTracks()
        ]);

        const recorder = new MediaRecorder(combined, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            
            // 強制ダウンロード処理
            const a = document.createElement('a');
            a.href = url;
            a.download = "ear_rape_result.webm";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            status.innerText = "保存が完了しました！";
        };

        recorder.start();
        video.onended = () => recorder.stop();
    };
</script>

</body>
</html>
